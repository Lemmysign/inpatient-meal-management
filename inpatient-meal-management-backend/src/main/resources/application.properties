# ============================================
# APPLICATION
# ============================================
spring.application.name=Hospital Meal Ordering System
server.port=9096
server.address=0.0.0.0

# ============================================
# DATABASE (PostgreSQL)
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/hospital_meal_db
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=HospitalMealPool

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Lagos
spring.jpa.open-in-view=false

# ============================================
# FLYWAY (Database Migration)
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__
spring.flyway.sql-migration-suffixes=.sql

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=
jwt.expiration-ms=86400000
jwt.patient-session-expiration-minutes=120

# ============================================
# HIS INTEGRATION
# ============================================
his.integration.enabled=false
his.api.base-url=
his.api.timeout-ms=5000
his.api.retry-attempts=3

# HIS Scraper Configuration
his.scraper.base-url=
his.scraper.username=
his.scraper.password=
his.scraper.keep-alive-interval-minutes=8
his.scraper.connection-timeout-ms=10000
his.scraper.read-timeout-ms=15000

# ============================================
# EMAIL CONFIGURATION
# ============================================
spring.mail.host=smtp.office365.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.office365.com
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000
spring.mail.properties.mail.smtp.transport.protocol=smtp
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.from=
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.debug=false

# Email settings
app.email.from=
app.email.from-name=Hospital Meal System

management.health.mail.enabled=false

# ============================================
# WEB PUSH NOTIFICATIONS
# ============================================
webpush.enabled=true
webpush.public.key=
webpush.private.key=
webpush.subject=

webpush.patient.enabled=true
webpush.kitchen.enabled=true
webpush.dietician.enabled=true

# ============================================
# ASYNC CONFIGURATION
# ============================================
spring.task.execution.pool.core-size=20
spring.task.execution.pool.max-size=50
spring.task.execution.pool.queue-capacity=200
spring.task.execution.thread-name-prefix=async-

# ============================================
# SCHEDULING
# ============================================
spring.task.scheduling.pool.size=3
spring.task.scheduling.thread-name-prefix=scheduled-

# Session cleanup schedule (every hour)
session.cleanup.cron=0 0 * * * *
session.cleanup.expired-days=7

# ============================================
# CORS
# ============================================
cors.allowed-origins=
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ============================================
# RATE LIMITING
# ============================================
ratelimit.enabled=true
ratelimit.patient-login.requests-per-minute=10
ratelimit.patient-order.requests-per-minute=5
ratelimit.staff-login.requests-per-minute=10
ratelimit.global.requests-per-minute=200
ratelimit.forgot-password.requests-per-minute=3
ratelimit.reset-password.requests-per-minute=5

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.c.h.m.a.PerformanceMonitoringAspect=INFO
logging.level.com.hospital.meal=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.orm.jdbc.extract=WARN
logging.level.org.springframework.security=WARN

# Logging pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file
logging.file.name=logs/hospital-meal-system.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# ============================================
# OPENAPI / SWAGGER
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.show-actuator=false

# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# ============================================
# PRINT SERVICE - XPrinter Configuration
# ============================================
print.label.width-mm=51.2
print.label.height-mm=34.1
print.printer.type=xprinter
print.label.tolerance-mm=0.5

# ============================================
# MULTIPART FILE UPLOAD
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# SERVER CONFIGURATION
# ============================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ============================================
# SPRING BOOT CONFIGURATION
# ============================================
spring.main.banner-mode=console
spring.output.ansi.enabled=always
spring.devtools.add-properties=false

app.base-url=http://localhost:9096
app.frontend-url=http://localhost:3000
